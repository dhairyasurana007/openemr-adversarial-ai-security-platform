name: Lint
on: [push, pull_request]
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install ruff==0.8.0
      - run: ruff check .
      - run: pip install pip-audit==2.7.3
      - run: pip-audit --requirement requirements.txt

  test-db-models:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: agentforge_test
          POSTGRES_USER: agentforge
          POSTGRES_PASSWORD: test
        ports: ["5432:5432"]
        options: --health-cmd pg_isready --health-interval 5s --health-timeout 5s --health-retries 5
    env:
      DATABASE_URL: postgresql+asyncpg://agentforge:test@localhost:5432/agentforge_test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install -r requirements.txt
      - run: alembic upgrade head
      - run: python -c "from state.models.attack import AttackRecord; print('models ok')"
