name: Tests
on: [push, pull_request]

jobs:
  test-db-models:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: agentforge_test
          POSTGRES_USER: agentforge
          POSTGRES_PASSWORD: test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+asyncpg://agentforge:test@localhost:5432/agentforge_test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install -r requirements.txt
      - run: alembic upgrade head
      - run: python -c "from state.models.attack import AttackRecord; print('models ok')"

  test-queue:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7
        ports: ["6379:6379"]
    env:
      REDIS_URL: redis://localhost:6379
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install -r requirements.txt
      - run: python -m pytest tests/test_queue.py -q

  test-judge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install -r requirements.txt
      - run: python -m pytest tests/test_judge.py -v

  test-orchestrator:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports: ["5432:5432"]
    env:
      DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/test
      REDIS_URL: redis://localhost:6379
      SESSION_COST_CAP_USD: "5.00"
      DAILY_COST_CAP_USD: "50.00"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install -r requirements.txt
      - run: alembic upgrade head
      - run: python -m pytest tests/test_orchestrator.py -v

  test-docs-agent:
    runs-on: ubuntu-latest
    env:
      OPENROUTER_API_KEY: "mock"
      DATABASE_URL: postgresql+asyncpg://user:pass@localhost:5432/db
      REDIS_URL: redis://localhost:6379
      SLACK_WEBHOOK_URL: "https://example.com/webhook"
      APPROVAL_CHANNEL: "#security"
      HMAC_SECRET_KEY: "ci-test-secret"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install -r requirements.txt
      - run: python -m pytest tests/test_documentation.py -v

  test-red-team:
    runs-on: ubuntu-latest
    env:
      OPENROUTER_API_KEY: "mock"
      DATABASE_URL: postgresql+asyncpg://user:pass@localhost:5432/db
      REDIS_URL: redis://localhost:6379
      TARGET_BASE_URL: "http://localhost:8080"
      SESSION_COOKIE: "PHPSESSID=test"
      CSRF_TOKEN: "test_csrf"
      SESSION_PATIENT_UUID: "aaaaaaaa-0000-0000-0000-000000000001"
      VICTIM_UUID: "bbbbbbbb-0000-0000-0000-000000000002"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install -r requirements.txt
      - run: python -m pytest tests/test_red_team.py -v

  test-graph:
    runs-on: ubuntu-latest
    env:
      OPENROUTER_API_KEY: "mock"
      DATABASE_URL: postgresql+asyncpg://user:pass@localhost:5432/db
      REDIS_URL: redis://localhost:6379
      TARGET_BASE_URL: "http://localhost:8080"
      SESSION_COOKIE: "PHPSESSID=test"
      CSRF_TOKEN: "test_csrf"
      SESSION_PATIENT_UUID: "aaaaaaaa-0000-0000-0000-000000000001"
      VICTIM_UUID: "bbbbbbbb-0000-0000-0000-000000000002"
      SLACK_WEBHOOK_URL: "https://example.com/webhook"
      APPROVAL_CHANNEL: "#security"
      HMAC_SECRET_KEY: "ci-test-secret"
      SESSION_COST_CAP_USD: "5.00"
      DAILY_COST_CAP_USD: "50.00"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install -r requirements.txt
      - run: python -m pytest tests/test_graph.py -v

  test-taxonomy:
    runs-on: ubuntu-latest
    env:
      OPENROUTER_API_KEY: "mock"
      DATABASE_URL: postgresql+asyncpg://user:pass@localhost:5432/db
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install -r requirements.txt
      - run: python -m pytest tests/test_taxonomy.py -v

  test-proxy:
    runs-on: ubuntu-latest
    env:
      TARGET_URL: "https://copilot.example.com"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install -r requirements.txt
      - run: python -m pytest tests/test_proxy.py -v

  test-regression-harness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install -r requirements.txt
      - run: python -m pytest tests/test_regression_harness.py -v

  test-observability:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install -r requirements.txt
      - run: python -m pytest tests/test_observability.py -v

  test-api:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env: { POSTGRES_DB: test, POSTGRES_USER: test, POSTGRES_PASSWORD: test }
        ports: ["5432:5432"]
      redis:
        image: redis:7
        ports: ["6379:6379"]
    env:
      DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/test
      REDIS_URL: redis://localhost:6379
      JWT_SECRET_KEY: "ci-jwt-secret"
      HMAC_SECRET_KEY: "ci-hmac-secret"
      SLACK_SIGNING_SECRET: "ci-slack-secret"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install -r requirements.txt
      - run: alembic upgrade head
      - run: python -m pytest tests/test_api.py -v

  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20" }
      - run: cd frontend && npm ci
      - run: cd frontend && npm run test
      - run: cd frontend && npm run build
      - run: cd frontend && npx tsc --noEmit
      - run: cd frontend && npm audit --audit-level=high

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: cp .env.example .env
      - run: |
          echo "POSTGRES_PASSWORD=test_password" >> .env
          echo "TARGET_URL=https://copilot.example.com" >> .env
      - run: docker compose build --no-cache
      - run: docker compose up -d
      - run: sleep 15
      - run: curl -f http://localhost:8000/docs
      - run: docker compose down

  validate-render-yaml:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install pyyaml
      - run: python -c "import yaml; yaml.safe_load(open('render.yaml', encoding='utf-8')); print('render.yaml ok')"

