envVarGroups:
  - name: agentforge-secrets
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.5
      - key: JWT_SECRET_KEY
        sync: false
      - key: HMAC_SECRET_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false

services:
  - type: web
    name: agentforge-adversarial-ai-security-platform-api
    runtime: python
    plan: standard
    envVars:
      - fromGroup: agentforge-secrets
      - key: DATABASE_URL
        fromDatabase:
          name: agentforge-adversarial-ai-security-platform-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: agentforge-adversarial-ai-security-platform-redis
          property: connectionString
    buildCommand: pip install -r requirements.txt && alembic upgrade head
    startCommand: uvicorn main:app --host 0.0.0.0 --port 8000

  - type: keyvalue
    name: agentforge-adversarial-ai-security-platform-redis
    plan: starter
    ipAllowList: []

  - type: web
    name: agentforge-adversarial-ai-security-platform-frontend
    runtime: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: agentforge-adversarial-ai-security-platform-postgres
    plan: basic-256mb
    databaseName: agentforge
    user: agentforge
    postgresMajorVersion: "16"
    ipAllowList: []
