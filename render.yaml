envVarGroups:
  - name: agentforge-secrets
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.5
      - key: JWT_SECRET_KEY
        sync: false
      - key: HMAC_SECRET_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false

services:
  - type: web
    name: agentforge-adversarial-ai-security-platform
    runtime: docker
    plan: standard
    envVars:
      - fromGroup: agentforge-secrets
      - key: DATABASE_URL
        fromDatabase:
          name: agentforge-adversarial-ai-security-platform-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: agentforge-adversarial-ai-security-platform-redis
          property: connectionString
      - key: TARGET_ENDPOINT
        sync: false
    dockerCommand: alembic upgrade head && uvicorn main:app --host 0.0.0.0 --port 10000

  - type: keyvalue
    name: agentforge-adversarial-ai-security-platform-redis
    plan: starter
    ipAllowList: []

databases:
  - name: agentforge-adversarial-ai-security-platform-postgres
    plan: basic-256mb
    databaseName: agentforge
    user: agentforge
    postgresMajorVersion: "16"
    ipAllowList: []
